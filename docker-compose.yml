name: trust-awaken

services:

  postgres:
    image: postgres:17
    container_name: trust-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: trust_awaken
      POSTGRES_USER: trust
      POSTGRES_PASSWORD: trust123
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: trust-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  mailpit:
    image: axllent/mailpit
    container_name: trust-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"

  minio:
    image: minio/minio
    container_name: trust-minio
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: trustawaken123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  meilisearch:
    image: getmeili/meilisearch:v1.16
    container_name: trust-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: trust-awaken-master-key
    ports:
      - "7700:7700"

volumes:

  postgres-data:

  minio-data: